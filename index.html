<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merel Nas</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background: #fff; color: #111; overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
::selection { background: #111; color: #fff; }

.layout { display: flex; height: 100vh; width: 100vw; overflow: hidden; }

.sidebar { display: none; width: 220px; flex-shrink: 0; padding: 2.5rem 2rem; flex-direction: column; justify-content: space-between; background: #fff; z-index: 10; }
@media (min-width: 768px) { .sidebar { display: flex; } }

.sidebar h1 { font-family: 'Cormorant', 'Cormorant Garamond', Georgia, serif; font-size: 30px; font-weight: 300; font-style: italic; letter-spacing: .01em; line-height: 1.15; margin-bottom: 2.5rem; }
.sidebar h1 a { transition: opacity .2s; }
.sidebar h1 a:hover { opacity: .5; }

.sidebar ul { list-style: none; display: flex; flex-direction: column; gap: .6rem; }
.sidebar li a { font-size: 13px; letter-spacing: .02em; opacity: .38; transition: opacity .2s; }
.sidebar li a:hover { opacity: .9; }
.sidebar li a.active { opacity: 1; font-weight: 500; }
.nav-bottom { margin-top: 1.5rem; }
.sidebar-bottom a { opacity: .3; transition: opacity .2s; display: inline-block; }
.sidebar-bottom a:hover { opacity: 1; }

.mobile-header { position: absolute; top: 0; left: 0; right: 0; padding: .9rem 1rem; display: flex; justify-content: space-between; align-items: center; z-index: 50; background: #fff; }
@media (min-width: 768px) { .mobile-header { display: none; } }
.mobile-header h1 { font-family: 'Cormorant', Georgia, serif; font-size: 28px; font-weight: 300; font-style: italic; }
.menu-icon { padding: 6px; background: none; border: none; cursor: pointer; line-height: 0; position: fixed; top: .75rem; right: .75rem; z-index: 300; }
@media (min-width: 768px) { .menu-icon { display: none; } }

.mobile-menu { display: none; position: fixed; inset: 0; z-index: 200; flex-direction: column; background: #fff; opacity: 0; pointer-events: none; transition: opacity .18s ease; overflow-y: auto; -ms-overflow-style: none; scrollbar-width: none; }
.mobile-menu::-webkit-scrollbar { display: none; }
.mobile-menu.open { opacity: 1; pointer-events: all; }
@media (max-width: 767px) { .mobile-menu { display: flex; } }

.m-topbar { height: 44px; flex-shrink: 0; display: flex; align-items: center; justify-content: flex-end; padding: 0 20px; background: #fff; }
.m-close { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; background: none; border: none; font-family: inherit; cursor: pointer; color: #111; }
.m-nav { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 16px 12px; text-align: center; }
.m-nav-item { display: block; padding: 1rem 0; cursor: pointer; border: none; background: none; font-family: inherit; text-align: center; width: 100%; text-decoration: none; color: #111; transition: opacity .15s; }
.m-nav-item:active { opacity: .25; }
.m-nav-title { font-family: 'Cormorant', Georgia, serif; font-size: clamp(2.4rem, 10vw, 4.5rem); font-weight: 300; font-style: italic; line-height: 1.05; color: #111; display: block; }

.main-content { flex-grow: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem .25rem .25rem; height: 100%; opacity: 0; transition: opacity .35s; }
@media (min-width: 768px) { .main-content { padding: 2rem; } }

.gallery-container { width: 100%; height: 100%; overflow-y: auto; }
.masonry { column-count: 1; column-gap: .5rem; }
@media (min-width: 640px) { .masonry { column-count: 2; } }
@media (min-width: 768px) { .masonry { column-count: 3; column-gap: 10px; } }
@media (min-width: 1200px) { .masonry { column-count: 4; } }
.masonry-item { break-inside: avoid; margin-bottom: .5rem; }
@media (min-width: 768px) { .masonry-item { margin-bottom: 10px; } }
.masonry-item img { width: 100%; height: auto; display: block; transition: opacity .25s; }
.masonry-item img:hover { opacity: .8; }

.lightbox { display: none; position: fixed; inset: 0; background: #fff; z-index: 100; align-items: center; justify-content: center; }
.lightbox:target { display: flex; }
.lightbox-close { position: absolute; inset: 0; z-index: 1; cursor: default; }
.lightbox-content { position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
.lightbox-image-container { display: flex; flex-direction: column; align-items: center; max-width: 100%; }
.lightbox-image-container img { max-width: 100%; max-height: 65vh; object-fit: contain; }
@media (min-width: 768px) { .lightbox-image-container img { max-height: 75vh; } }
.lightbox-info { text-align: center; margin-top: 1.2rem; padding: 0 1rem; }
.lightbox-info h3 { font-family: 'Cormorant', Georgia, serif; font-size: 18px; font-weight: 400; font-style: italic; }
.lightbox-info p { font-size: 13px; opacity: .5; margin-top: 4px; }
.lightbox-info .year { display: block; font-size: 11px; opacity: .35; margin-top: 4px; letter-spacing: .06em; }
.lightbox-prev, .lightbox-next { position: absolute; top: 0; bottom: 0; width: 33%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; color: #111; }
.lightbox-prev { left: 0; justify-content: flex-start; padding-left: 1rem; cursor: w-resize; }
.lightbox-next { right: 0; justify-content: flex-end; padding-right: 1rem; cursor: e-resize; }
.lightbox-prev:hover, .lightbox-next:hover { opacity: 1; }
@media (max-width: 767px) { .lightbox-prev, .lightbox-next { top: auto; bottom: 2rem; width: auto; opacity: .5; } .lightbox-prev { left: 1rem; } .lightbox-next { right: 1rem; } }

.info-page { width: 100%; height: 100%; overflow-y: auto; padding: 3rem 2.5rem 4rem; }
@media (min-width: 768px) { .info-page { display: grid; grid-template-columns: 1fr 240px; gap: 4rem; align-items: start; padding: 3rem 3rem 4rem; } }
.info-bio { margin-bottom: 3rem; }
.info-bio p { font-size: 15px; line-height: 1.85; color: #111; margin-bottom: 1rem; max-width: 54ch; }
.info-section { margin-bottom: 2.5rem; }
.info-section h3 { font-size: 10px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; opacity: .35; margin-bottom: 1rem; }
.info-list { list-style: none; }
.info-list li { display: grid; grid-template-columns: 44px 1fr; gap: .75rem; padding: .45rem 0; border-top: 1px solid rgba(0,0,0,.07); font-size: 13px; line-height: 1.5; }
.info-list li:last-child { border-bottom: 1px solid rgba(0,0,0,.07); }
.info-year { opacity: .35; font-size: 12px; padding-top: 1px; }
.info-contact { position: sticky; top: 3rem; }
.info-contact-item { margin-bottom: 1.5rem; }
.info-contact-label { font-size: 10px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; opacity: .35; margin-bottom: .3rem; }
.info-contact-value { font-size: 13px; line-height: 1.5; }
.info-contact-value a { border-bottom: 1px solid rgba(0,0,0,.3); padding-bottom: 1px; transition: opacity .2s; }
.info-contact-value a:hover { opacity: .5; }
@media (max-width: 767px) { .info-contact { margin-top: 1rem; position: static; } .info-bio p { font-size: 14px; } }

/* ── Burger → X animation ── */
.burger { width: 22px; height: 16px; position: relative; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; }
.burger span { display: block; height: 1.5px; width: 100%; background: #111; border-radius: 2px; transition: transform .35s cubic-bezier(.23,1,.32,1), opacity .2s, top .3s cubic-bezier(.23,1,.32,1); transform-origin: center; position: absolute; left: 0; }
.burger span:nth-child(1) { top: 0; }
.burger span:nth-child(2) { top: 50%; transform: translateY(-50%); }
.burger span:nth-child(3) { top: 100%; transform: translateY(-100%); }
.burger.is-open span:nth-child(1) { top: 50%; transform: translateY(-50%) rotate(45deg); }
.burger.is-open span:nth-child(2) { opacity: 0; transform: translateY(-50%) scaleX(0); }
.burger.is-open span:nth-child(3) { top: 50%; transform: translateY(-50%) rotate(-45deg); }

</style>
</head>
<body>
<div class="layout">

  <div class="sidebar">
    <div class="sidebar-top">
      <h1><a href="/">Merel Nas</a></h1>
      <nav>
        <ul id="sidebar-nav-years">
          <li><a href="/" class="">Home</a></li>
        </ul>
      </nav>
      <nav class="nav-bottom">
        <ul>
          <li><a href="/info" class="">Info</a></li>
          <li><a href="/portfolio.pdf" target="_blank" rel="noopener noreferrer">Portfolio</a></li>
        </ul>
      </nav>
    </div>
    <div class="sidebar-bottom">
      <a href="https://instagram.com/merelnas" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
      </a>
    </div>
  </div>

  <div class="mobile-header">
    <h1><a href="/">Merel Nas</a></h1>
  </div>

  <button class="menu-icon" id="burger-btn" onclick="toggleMenu()" aria-label="Menu">
    <div class="burger" id="burger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </button>

  <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
    <div class="m-nav" id="mobile-nav-years">
      <!-- populated by portfolio-loader.js -->
    </div>
  </div>

  <main class="main-content">
    <div id="portfolio-grid"></div>
  </main>
</div>

<script>
function toggleMenu() {
  const menu   = document.getElementById('mobile-menu');
  const burger = document.getElementById('burger');
  const isOpen = menu.classList.contains('open');
  menu.classList.toggle('open', !isOpen);
  burger.classList.toggle('is-open', !isOpen);
  menu.setAttribute('aria-hidden', isOpen ? 'true' : 'false');
  document.body.style.overflow = isOpen ? '' : 'hidden';
}
window.toggleMenu = toggleMenu;
</script>
<script>
/**
 * portfolio-loader.js
 * - index.html  : loads all years newest-first
 * - year.html   : detects year from URL, loads that year's JSON
 * - info.html   : renders bio, exhibitions, education, contact from site.json
 * - all pages   : builds nav from site.json navYears, applies name/instagram/etc
 */
(function () {

  function detectYear() {
    const m = window.location.pathname.match(/\b(20\d{2})\b/);
    return m ? parseInt(m[1]) : null;
  }
  function isIndex() {
    const p = window.location.pathname;
    return p === '/' || p === '/index.html' || p === '';
  }
  function isInfo() {
    return /\/info(\.html)?$/.test(window.location.pathname);
  }

  // ── Build + inject sidebar nav from navYears ──────────────────
  function buildNav(navYears) {
    const sorted = [...navYears].sort((a, b) => b - a);
    const currentYear = detectYear();

    ['sidebar-nav-years', 'mobile-nav-years'].forEach(id => {
      const ul = document.getElementById(id);
      if (!ul) return;
      // Remove existing year links (keep Home for sidebar)
      [...ul.querySelectorAll('li a')].forEach(a => {
        if (/\/20\d{2}/.test(a.getAttribute('href'))) a.parentElement.remove();
      });
      if (id === 'sidebar-nav-years') {
        const homeLi = ul.querySelector('li');
        sorted.forEach(y => {
          const li = document.createElement('li');
          const a  = document.createElement('a');
          a.href = '/' + y;
          a.textContent = y;
          if (currentYear === y) a.className = 'active';
          li.appendChild(a);
          homeLi ? homeLi.insertAdjacentElement('afterend', li) : ul.appendChild(li);
        });
      } else {
        // For mobile-nav-years, replace with m-nav structure
        ul.outerHTML = '<div class="m-nav" id="mobile-nav-years"><a class="m-nav-item" href="/info"><span class="m-nav-title">Info</span></a><a class="m-nav-item" href="/portfolio.pdf" target="_blank"><span class="m-nav-title">Portfolio</span></a>' + sorted.map(y => `<button class="m-nav-item" onclick="window.location.href=\'/${y}\'"><span class="m-nav-title">${y}</span></button>`).join('') + '<a class="m-nav-item" href="/merel_nas_cv.pdf" download><span class="m-nav-title">CV</span></a></div>';
      }
    });
  }

  // ── Apply site.json to page ───────────────────────────────────
  function applySiteSettings(s) {
    if (!s) return;
    if (s.instagram) {
      document.querySelectorAll('a[href*="instagram.com"]').forEach(el => {
        el.href = 'https://instagram.com/' + s.instagram.replace('@', '');
      });
    }
    if (s.cvFile) {
      document.querySelectorAll('a[href*="portfolio.pdf"], a[href*=".pdf"]').forEach(el => {
        if (!el.href.includes('mailto')) el.href = '/' + s.cvFile;
      });
    }
    const navYears = (s.navYears && s.navYears.length) ? s.navYears : (s.years || []);
    if (navYears.length) buildNav(navYears);
  }

  // ── Info page ─────────────────────────────────────────────────
  function buildInfoPage(s) {
    const bio         = s.bio || '';
    const exhibitions = (s.exhibitions || []).slice().sort((a,b) => (b.year||0)-(a.year||0));
    const education   = (s.education   || []).slice().sort((a,b) => (b.year||0)-(a.year||0));

    const bioHtml = bio
      ? bio.split('\n').filter(l=>l.trim()).map(l=>`<p>${esc(l)}</p>`).join('')
      : '<p style="opacity:.4">Bio coming soon.</p>';

    const listHtml = (items, emptyMsg) => items.length
      ? `<ul class="info-list">${items.map(e=>`
          <li>
            <span class="info-year">${esc(String(e.year||''))}</span>
            <span>${esc(e.title)}${(e.venue||e.institution)?`<br><span style="opacity:.5">${esc(e.venue||e.institution)}</span>`:''}</span>
          </li>`).join('')}</ul>`
      : `<p style="opacity:.4;font-size:.9rem">${emptyMsg}</p>`;

    return `
    <div class="info-page">
      <div class="info-main">
        <div class="info-bio">${bioHtml}</div>
        <div class="info-section">
          <h3>Exhibitions</h3>
          ${listHtml(exhibitions, 'No exhibitions listed yet.')}
        </div>
        <div class="info-section">
          <h3>Education</h3>
          ${listHtml(education, 'No education listed yet.')}
        </div>
      </div>
      <aside class="info-contact">
        ${s.email?`<div class="info-contact-item">
          <div class="info-contact-label">Email</div>
          <div class="info-contact-value"><a href="mailto:${esc(s.email)}">${esc(s.email)}</a></div>
        </div>`:''}
        ${s.instagram?`<div class="info-contact-item">
          <div class="info-contact-label">Instagram</div>
          <div class="info-contact-value"><a href="https://instagram.com/${esc(s.instagram)}" target="_blank" rel="noopener noreferrer">@${esc(s.instagram)}</a></div>
        </div>`:''}
        ${s.contactText?`<div class="info-contact-item">
          <div class="info-contact-value" style="opacity:.6;font-size:.85rem;line-height:1.6">${esc(s.contactText)}</div>
        </div>`:''}
      </aside>
    </div>`;
  }

  // ── Gallery ───────────────────────────────────────────────────
  function buildGallery(items, year) {
    const thumbs = items.map((item, i) => `
      <div class="masonry-item">
        <a href="#pf-img-${year}-${i}">
          <img src="${esc(item.image)}" alt="${esc(item.title)}" loading="lazy">
        </a>
      </div>`).join('');

    const lightboxes = items.map((item, i) => {
      const prev = i === 0 ? items.length - 1 : i - 1;
      const next = i === items.length - 1 ? 0 : i + 1;
      return `
      <div id="pf-img-${year}-${i}" class="lightbox">
        <a href="#!" class="lightbox-close"></a>
        <div class="lightbox-content">
          <a href="#pf-img-${year}-${prev}" class="lightbox-prev">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          </a>
          <div class="lightbox-image-container">
            <img src="${esc(item.image)}" alt="${esc(item.title)}">
            <div class="lightbox-info">
              <h3>${esc(item.title)}</h3>
              ${item.description?`<p>${esc(item.description)}</p>`:''}
              ${item.material?`<p style="opacity:.6;font-size:13px">${esc(item.material)}</p>`:''}
              <span class="year">${year}</span>
            </div>
          </div>
          <a href="#pf-img-${year}-${next}" class="lightbox-next">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </a>
        </div>
      </div>`;
    }).join('');

    return `<div class="masonry">${thumbs}</div>${lightboxes}`;
  }

  function fetchYear(year) {
    return fetch(`data/portfolio-${year}.json?v=${Date.now()}`)
      .then(r => r.ok ? r.json() : []).catch(() => []);
  }

  function toggleMenu() {
    var m = document.getElementById('mobile-menu');
    var open = m.classList.contains('open');
    m.classList.toggle('open', !open);
    m.setAttribute('aria-hidden', open ? 'true' : 'false');
    document.body.style.overflow = open ? '' : 'hidden';
  }

  // ── Main ──────────────────────────────────────────────────────
  var colors = {'about':'#9EB5B5', 'default':'#E3B959'};
  var hideTimer, isFull = false, cur = {};
  function applyColor(id) { var c = colors[id] || colors['default']; document.getElementById('popup-overlay').style.backgroundColor = c; document.getElementById('popup-header').style.backgroundColor = c; document.getElementById('popup-body-wrapper').style.backgroundColor = c; }
  function fill(title, text) { document.getElementById('popup-title').textContent = title; document.getElementById('popup-content').innerHTML = '<p>' + text + '</p>'; }
  function openAbout() { cur = {id:'about', title:'Info', text: aboutText}; applyColor('about'); fill('Info', aboutText); openFull(); }
  function closeMenu() {
    var m = document.getElementById('mobile-menu');
    if (!m) return;
    m.classList.remove('open');
    m.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }
  function goTo(id, title, text) {
    closeMenu();
    var el = document.getElementById(id);
    if (!el) return;
    setTimeout(function() {
      smoothTo(el.getBoundingClientRect().top + window.scrollY - 60, 450);
      setTimeout(function() { cur = {id: id, title: title, text: text}; applyColor(id); fill(title, text); openFull(); }, 470);
    }, 160);
  }
  function smoothTo(y, ms) {
    var sy = window.scrollY, d = y - sy, t0 = null;
    function step(now) { if (!t0) t0 = now; var t = Math.min((now - t0) / ms, 1); var e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; window.scrollTo(0, sy + d * e); if (t < 1) requestAnimationFrame(step); }
    requestAnimationFrame(step);
  }
  function teaser(id, title, text) { if (isFull) return; clearTimeout(hideTimer); cur = {id: id, title: title, text: text}; applyColor(id); fill(title, text); var p = document.getElementById('popup-overlay'); p.style.height = '50px'; p.classList.add('visible'); document.getElementById('popup-action-btn').textContent = 'More'; }
  function startHide() { if (!isFull) hideTimer = setTimeout(closePopup, 1000); }
  function cancelHide() { clearTimeout(hideTimer); }
  function openFull() { if (cur.id) { applyColor(cur.id); fill(cur.title, cur.text); } isFull = true; clearTimeout(hideTimer); var p = document.getElementById('popup-overlay'); p.classList.add('is-full'); p.style.height = '62vh'; p.classList.add('visible'); document.getElementById('popup-action-btn').textContent = 'Close'; }
  function handleBtn() { isFull ? closePopup() : openFull(); }
  function closePopup() { isFull = false; var p = document.getElementById('popup-overlay'); p.classList.remove('is-full'); p.classList.add('notransition'); p.style.height = '50px'; p.getBoundingClientRect(); p.classList.remove('notransition'); p.classList.remove('visible'); }
  document.addEventListener('click', function(e) { var mm = document.getElementById('mobile-menu'); if (!mm || !mm.classList.contains('open')) return; if (e.target.closest('.menu-icon')) return; if (!mm.contains(e.target)) closeMenu(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { closeMenu(); closePopup(); } });

  // ── Main ──────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {

    const sitePromise = fetch('site.json?v=' + Date.now())
      .then(r => r.ok ? r.json() : {}).catch(() => ({}));

    sitePromise.then(s => applySiteSettings(s));

    // Info page
    const infoContainer = document.getElementById('info-grid');
    if (infoContainer) {
      sitePromise.then(s => { infoContainer.innerHTML = buildInfoPage(s); });
      return;
    }

    // Gallery
    const container = document.getElementById('portfolio-grid');
    if (!container) return;

    const yearsPromise = isIndex()
      ? sitePromise.then(s => {
          const ny = (s.navYears && s.navYears.length) ? s.navYears : (s.years || []);
          return [...ny].sort((a,b) => b-a);
        })
      : Promise.resolve([detectYear()].filter(Boolean));

    container.innerHTML = '<div class="gallery-container"><p style="text-align:center;padding:3rem;opacity:.4;font-size:14px">Loading…</p></div>';

    yearsPromise.then(years => {
      if (!years.length) {
        container.innerHTML = '<div class="gallery-container"><p style="text-align:center;padding:3rem;opacity:.4;font-size:14px">Could not detect year.</p></div>';
        return;
      }
      Promise.all(years.map(y => fetchYear(y).then(items => ({ year: y, items }))))
        .then(results => {
          const filled = results.filter(r => r.items && r.items.length);
          if (!filled.length) {
            container.innerHTML = '<div class="gallery-container"><p style="text-align:center;padding:3rem;opacity:.4;font-size:14px">No works added yet.</p></div>';
            return;
          }
          if (isIndex()) {
            container.innerHTML = filled.map(({year, items}) =>
              `<div class="gallery-container" id="year-section-${year}">${buildGallery(items, year)}</div>`
            ).join('');
            document.querySelector('main').style.opacity = '1';
          } else {
            const {year, items} = filled[0];
            container.innerHTML = `<div class="gallery-container">${buildGallery(items, year)}</div>`;
            document.querySelector('main').style.opacity = '1';
          }
        });
    });
  });

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  window.toggleMenu = toggleMenu;
  window.closeMenu = closeMenu;
  window.openAbout = openAbout;
  window.goTo = goTo;
  window.handleBtn = handleBtn;

})();

</script>
